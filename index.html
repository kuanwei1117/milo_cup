<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <title>Milo盃 BEYBLADE X 邀請賽</title>
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff0055;
            --tertiary: #cc00ff;
            --quaternary: #ffaa00;
            --gold: #ffd700;
            --bg: #121212;
            --panel: #1e1e24;
            --text: #e0e0e0;
            --border: #333;
            
            /* Scoreboard Colors */
            --sb-p1-color: #00e5ff;
            --sb-p2-color: #ff0055;
            --sb-bg-color: #0a0a0c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            min-height: 100dvh;
        }

        /* ================= 頂部導航列與專屬 UI ================= */
        .top-bar {
            background: rgba(0, 0, 0, 0.95); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 200; backdrop-filter: blur(10px);
            padding: env(safe-area-inset-top) 10px 10px;
        }

        /* 絕對防護的分頁按鈕 CSS */
        .tab-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            letter-spacing: 0.5px;
        }
        .tab-active {
            background-color: var(--primary) !important;
            color: #000 !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }
        .tab-inactive {
            background-color: #1f2937 !important; /* 深灰色 */
            color: #9ca3af !important;
            border-color: #374151 !important;
        }
        .tab-inactive:hover {
            background-color: #374151 !important;
            color: #fff !important;
        }

        /* 賽事內的帶入計分板按鈕 */
        .action-btn {
            background-color: rgba(0, 255, 204, 0.15);
            color: var(--primary);
            border: 1px solid rgba(0, 255, 204, 0.5);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin: 0 4px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .action-btn:hover {
            background-color: var(--primary);
            color: #000;
        }

        h1 { color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); letter-spacing: 2px; }
        .panel { background: var(--panel); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        textarea, select, input[type="text"]:not(.sb-input) {
            background: #111; color: #fff; border: 1px solid #444; 
            outline: none; transition: border-color 0.2s;
        }
        textarea:focus, select:focus, input[type="text"]:not(.sb-input):focus { border-color: var(--primary); }
        
        .btn-primary { background: var(--primary); color: #000; transition: all 0.2s; font-weight: bold;}
        .btn-primary:hover { background: #00cca3; transform: scale(0.98); }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: center; }
        .score-ctrl { background: #333; color: white; width: 24px; height: 24px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-weight: bold; }
        .score-ctrl:active { background: #555; }

        .match-row { background: rgba(0, 0, 0, 0.4); border: 1px solid #2a2a2a; border-radius: 8px; margin-bottom: 8px; }
        .score-box { display: inline-block; min-width: 30px; height: 30px; line-height: 30px; text-align: center; background: rgba(255,255,255,0.05); border: 1px solid #555; border-radius: 4px; color: var(--gold); font-weight: bold; }

        .matchup { background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        .matchup-title { font-size: 0.8em; text-align: center; padding: 4px; background: #222; color: #888; border-bottom: 1px solid #444; }
        .matchup.gold { border-color: var(--gold); }
        .matchup.gold .matchup-title { background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        .seed { font-size: 0.7em; background: #444; color: #aaa; padding: 3px 6px; border-radius: 4px; margin-right: 8px; }

        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ================= 🏆 計分板專屬樣式 ================= */
        #scoreboard-screen { background-color: var(--sb-bg-color); height: calc(100dvh - 65px); width: 100%; overflow: hidden; flex-direction: column; }
        .sb-settings-bar { background: rgba(0, 0, 0, 0.6); border-bottom: 1px solid #333; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: clamp(40px, 5vh, 60px); flex-shrink: 0; }
        .sb-settings-bar select { background: #222; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: clamp(0.8rem, 1.5vw, 1.2rem); outline: none; }
        .sb-main-arena { display: grid; grid-template-columns: 1fr auto 1fr; flex: 1; position: relative; padding: clamp(10px, 2vh, 30px) clamp(10px, 3vw, 40px); gap: clamp(10px, 3vw, 40px); overflow-y: auto; }
        .sb-center-hub { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10, 10, 12, 0.8); padding: clamp(10px, 2vh, 30px) clamp(15px, 3vw, 50px); border-radius: 20px; border: 2px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5); align-self: center; z-index: 10; }
        .sb-scores-wrapper { display: flex; align-items: center; gap: clamp(10px, 2vw, 30px); }
        .sb-score-number { font-size: clamp(4rem, 20vh, 18rem); font-weight: 900; font-family: monospace; width: clamp(60px, 15vw, 220px); text-align: center; line-height: 1; transition: transform 0.1s; }
        #sb-score-1 { color: var(--sb-p1-color); text-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }
        #sb-score-2 { color: var(--sb-p2-color); text-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
        .sb-score-number.bump { transform: scale(1.15); }
        .sb-vs-text { font-size: clamp(1.2rem, 4vh, 2.5rem); color: #555; font-style: italic; }
        .sb-side-panel { display: flex; flex-direction: column; justify-content: center; padding: clamp(5px, 1.5vw, 20px); border-radius: 15px; }
        .sb-side-1 { align-items: flex-start; background: linear-gradient(90deg, rgba(0,229,255,0.08) 0%, transparent 100%); }
        .sb-side-2 { align-items: flex-end; background: linear-gradient(270deg, rgba(255,0,85,0.08) 0%, transparent 100%); }
        .sb-player-name { font-size: clamp(1.5rem, 5vh, 3.5rem); font-weight: bold; background: transparent; border: none; color: #fff; width: 90%; border-bottom: 3px solid #444; padding-bottom: 5px; margin-bottom: clamp(10px, 3vh, 30px); text-transform: uppercase; }
        .sb-side-1 .sb-player-name { text-align: left; border-bottom-color: var(--sb-p1-color); }
        .sb-side-2 .sb-player-name { text-align: right; border-bottom-color: var(--sb-p2-color); }
        .sb-player-name:focus { outline: none; border-bottom-color: #fff; }
        .sb-action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(8px, 1.5vh, 15px); width: 100%; max-width: 600px; }
        .sb-btn { background: rgba(30, 30, 40, 0.8); border: 1px solid #444; color: #ddd; padding: clamp(10px, 2.5vh, 25px) clamp(8px, 1.5vw, 15px); border-radius: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; transition: all 0.1s; }
        .sb-btn-title { font-size: clamp(0.9rem, 1.8vh, 1.5rem); text-align: center;}
        .sb-btn-points { font-size: clamp(1.5rem, 3vh, 2.5rem); font-family: monospace; }
        .sb-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .sb-side-1 .sb-btn:hover { border-color: var(--sb-p1-color); background: rgba(0,229,255,0.1); }
        .sb-side-1 .sb-btn-points { color: var(--sb-p1-color); }
        .sb-side-2 .sb-btn:hover { border-color: var(--sb-p2-color); background: rgba(255,0,85,0.1); }
        .sb-side-2 .sb-btn-points { color: var(--sb-p2-color); }
        .sb-btn-extreme { grid-column: span 2; background: linear-gradient(90deg, #3a2000, #222); border-color: #8a6a00; }
        .sb-btn-extreme .sb-btn-points { color: var(--gold) !important; }
        .sb-utility-row { grid-column: span 2; display: flex; gap: clamp(8px, 1.5vw, 15px); width: 100%; margin-top: clamp(4px, 1vh, 10px); }
        .sb-btn-util { flex: 1; background: #222; border: 1px solid #444; color: #888; padding: clamp(8px, 1.5vh, 15px); border-radius: 8px; font-size: clamp(0.9rem, 1.5vh, 1.2rem); cursor: pointer; }
        .sb-btn-util:hover { background: #333; color: #fff; }
        .sb-victory-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 100; }
        .sb-victory-screen.active { opacity: 1; pointer-events: auto; }
        .sb-winner-banner { font-size: clamp(3rem, 8vw, 7rem); font-weight: 900; margin-bottom: 10px; }
        .sb-p1-win .sb-winner-banner { color: var(--sb-p1-color); text-shadow: 0 0 30px var(--sb-p1-color); }
        .sb-p2-win .sb-winner-banner { color: var(--sb-p2-color); text-shadow: 0 0 30px var(--sb-p2-color); }
        .sb-next-btn { background: transparent; border: 2px solid #fff; color: #fff; padding: 12px 40px; font-size: clamp(1.2rem, 3vw, 2rem); border-radius: 40px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .sb-next-btn:hover { background: #fff; color: #000; }

        @media (orientation: portrait) {
            .sb-main-arena { display: flex; flex-direction: column; padding: 10px; }
            .sb-center-hub { position: relative; padding: 10px 20px; box-shadow: 0 0 15px rgba(0,0,0,0.5); align-self: center; width: auto; margin: 10px 0;}
            .sb-side-panel { align-items: center !important; flex: 1; justify-content: flex-start;}
            .sb-player-name { text-align: center !important; width: 100%; direction: ltr !important;}
            .sb-action-buttons { max-width: 100%; }
            .sb-vs-text { display: none; }
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- ================= 頂部導航 ================= -->
    <div class="top-bar w-full flex justify-between items-center overflow-x-auto whitespace-nowrap">
        <div class="flex items-center gap-3">
            <div class="font-bold text-gray-400 text-sm tracking-wide hidden sm:block">Milo Cup</div>
            
            <!-- 分頁按鈕 -->
            <div id="nav-tabs" class="hidden flex gap-2">
                <button onclick="switchTab('main')" id="tab-btn-main" class="tab-btn tab-active">🏆 賽程</button>
                <button onclick="switchTab('score')" id="tab-btn-score" class="tab-btn tab-inactive">⚔️ 計分</button>
            </div>
        </div>

        <div class="flex gap-2 items-center">
            <button class="tab-btn" style="background: rgba(0,255,204,0.1); color: var(--primary); border: 1px solid var(--primary);" onclick="toggleFullScreen()" id="fs-btn">
                🔲 全螢幕
            </button>
            <div id="user-info" class="text-sm hidden items-center">
                <span id="role-badge" class="px-2 py-1 rounded text-xs font-bold mr-2"></span>
                <button onclick="logout()" class="text-gray-400 underline text-xs">切換</button>
            </div>
        </div>
    </div>

    <!-- ================= 1️⃣ 賽程表容器 (App Container) ================= -->
    <div id="app-container" class="w-full flex-1 flex-col items-center pb-20 overflow-y-auto" style="display: flex;">
        <div class="text-center my-6 px-2 w-full">
            <h1 class="text-3xl md:text-4xl font-black uppercase">🏆 Milo盃 BEYBLADE X</h1>
            <p id="system-status" class="text-gray-400 mt-2 text-sm">連線中...</p>
        </div>

        <div id="loading-screen" class="w-full max-w-md p-8 text-center hidden"><div class="loader mb-4"></div><p>正在同步賽事資料...</p></div>

        <div id="login-screen" class="w-full max-w-md p-6 panel rounded-2xl hidden mx-4">
            <h2 class="text-xl text-primary font-bold border-b-2 border-primary pb-2 mb-6">請選擇您的身分</h2>
            <div class="mb-8">
                <h3 class="text-gray-300 font-bold mb-3">👤 我是參賽選手</h3>
                <select id="player-select" class="w-full p-3 rounded-lg mb-3"><option value="">-- 請選擇 --</option></select>
                <button onclick="loginAsPlayer()" class="w-full btn-primary p-3 rounded-lg">進入選手儀表板</button>
            </div>
            <div class="border-t border-gray-700 pt-6">
                <h3 class="text-gray-300 font-bold mb-3">👑 我是主辦單位 (Admin)</h3>
                <button onclick="loginAsAdmin()" class="w-full bg-gray-800 hover:bg-gray-700 text-white border border-gray-600 p-3 rounded-lg transition-colors">進入主控台</button>
            </div>
        </div>

        <div id="setup-screen" class="w-full max-w-2xl p-6 panel rounded-2xl hidden mx-4">
            <h2 class="text-xl text-primary font-bold border-b-2 border-primary pb-2 mb-6">⚙️ 建立新賽事</h2>
            <div class="flex flex-col gap-2 mb-6"><label class="text-gray-300 font-bold">1. 參賽選手名單</label><textarea id="playerList" class="p-4 rounded-lg h-40" placeholder="選手A&#10;選手B"></textarea></div>
            <div class="flex flex-col gap-2 mb-4">
                <label class="text-gray-300 font-bold">2. 選擇賽制</label>
                <select id="tournamentFormat" class="p-3 rounded-lg" onchange="toggleGroupCount()">
                    <option value="group">🔥 小組賽 + 淘汰賽</option><option value="knockout">⚔️ 直接單淘汰賽 (系統自動排籤)</option>
                </select>
            </div>
            <div class="flex flex-col gap-2 mb-6" id="groupCountContainer">
                <label class="text-gray-300 font-bold">3. 預賽要分成幾組？</label>
                <select id="groupCount" class="p-3 rounded-lg"><option value="2">分成 2 組</option><option value="3" selected>分成 3 組</option><option value="4">分成 4 組</option></select>
            </div>
            <button onclick="generateTournament()" class="w-full btn-primary p-4 rounded-lg text-lg">🚀 產生並發布賽程</button>
        </div>

        <div id="main-board-screen" class="w-full max-w-6xl px-4 hidden">
            <div id="player-dashboard" class="mb-8 panel border-primary rounded-xl p-4 hidden pulse">
                <div class="flex items-center gap-3 mb-2"><span class="text-2xl">🔥</span><h3 class="text-lg font-bold text-white">您的下一場賽事</h3></div>
                <div id="next-match-content" class="bg-black/50 rounded-lg p-4 text-center border border-gray-700"></div>
            </div>
            <div id="groups-container" class="flex flex-wrap gap-6 justify-center mb-10"></div>
            <div id="knockout-section" class="panel rounded-xl p-6 w-full hidden">
                <h2 id="knockout-title" class="text-2xl text-gold border-b-2 border-gold pb-3 mb-6 text-center font-bold">🏆 決賽階段 - 終極淘汰賽</h2>
                <div id="knockout-container" class="grid gap-6"></div>
            </div>
            <div id="admin-controls" class="mt-12 text-center hidden">
                <button onclick="resetTournament()" class="text-red-500 border border-red-900 bg-red-900/20 px-6 py-2 rounded-full hover:bg-red-900/40 transition">⚠️ 刪除並重置整個賽事</button>
            </div>
        </div>
    </div> 

    <!-- ================= 2️⃣ 電子計分板容器 (Scoreboard) ================= -->
    <div id="scoreboard-screen" style="display: none;">
        <div class="sb-settings-bar">
            <span class="text-gray-400 font-bold text-sm tracking-widest hidden sm:inline">ELECTRONIC SCOREBOARD</span>
            <div class="flex gap-2">
                <select id="sb-winCondition" onchange="checkSbWinner()">
                    <option value="4" selected>先得 4 分</option><option value="5">先得 5 分</option><option value="7">先得 7 分</option>
                </select>
            </div>
        </div>

        <div class="sb-main-arena">
            <div class="sb-side-panel sb-side-1">
                <input type="text" class="sb-player-name sb-input" id="sb-name-1" value="PLAYER 1">
                <div class="sb-action-buttons">
                    <button class="sb-btn sb-btn-extreme" onclick="addSbScore(1, 3)"><span class="sb-btn-title">極限擊殺 X-Dash</span><span class="sb-btn-points">+3</span></button>
                    <button class="sb-btn" onclick="addSbScore(1, 2)"><span class="sb-btn-title">擊爆 Burst</span><span class="sb-btn-points">+2</span></button>
                    <button class="sb-btn" onclick="addSbScore(1, 2)"><span class="sb-btn-title">擊飛 Over</span><span class="sb-btn-points">+2</span></button>
                    <button class="sb-btn" style="grid-column: span 2;" onclick="addSbScore(1, 1)"><span class="sb-btn-title">轉停獲勝 Spin Finish</span><span class="sb-btn-points">+1</span></button>
                    <div class="sb-utility-row"><button class="sb-btn-util" onclick="addSbScore(1, -1)">-1 倒扣</button><button class="sb-btn-util" onclick="resetSbPlayer(1)">分數歸零</button></div>
                </div>
            </div>

            <div class="sb-center-hub">
                <div class="sb-scores-wrapper">
                    <div class="sb-score-number" id="sb-score-1">0</div>
                    <div class="sb-vs-text">VS</div>
                    <div class="sb-score-number" id="sb-score-2">0</div>
                </div>
            </div>

            <div class="sb-side-panel sb-side-2">
                <input type="text" class="sb-player-name sb-input" id="sb-name-2" value="PLAYER 2" style="direction: rtl;">
                <div class="sb-action-buttons">
                    <button class="sb-btn sb-btn-extreme" onclick="addSbScore(2, 3)"><span class="sb-btn-title">極限擊殺 X-Dash</span><span class="sb-btn-points">+3</span></button>
                    <button class="sb-btn" onclick="addSbScore(2, 2)"><span class="sb-btn-title">擊爆 Burst</span><span class="sb-btn-points">+2</span></button>
                    <button class="sb-btn" onclick="addSbScore(2, 2)"><span class="sb-btn-title">擊飛 Over</span><span class="sb-btn-points">+2</span></button>
                    <button class="sb-btn" style="grid-column: span 2;" onclick="addSbScore(2, 1)"><span class="sb-btn-title">轉停獲勝 Spin Finish</span><span class="sb-btn-points">+1</span></button>
                    <div class="sb-utility-row"><button class="sb-btn-util" onclick="resetSbPlayer(2)">分數歸零</button><button class="sb-btn-util" onclick="addSbScore(2, -1)">-1 倒扣</button></div>
                </div>
            </div>
        </div>

        <div class="sb-victory-screen" id="sb-victory-screen">
            <div class="sb-winner-banner">WINNER</div>
            <div id="sb-winner-name" style="font-size: clamp(1.8rem, 5vw, 4rem); color: #fff; margin-bottom: 20px; font-weight:bold; text-transform:uppercase;"></div>
            <button class="sb-next-btn" onclick="resetAllAndCloseSbVictory()">關閉 / 下一場</button>
        </div>
    </div>

    <!-- 模態框 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[300] hidden">
        <div class="bg-gray-800 border border-gray-600 p-6 rounded-xl max-w-sm w-full mx-4 text-center shadow-2xl">
            <p id="modal-msg" class="text-lg mb-6 text-white"></p>
            <button onclick="closeModal()" class="btn-primary px-6 py-2 rounded-lg">確定</button>
        </div>
    </div>

    <!-- Firebase Scripts & Main Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🚨 請在這裡貼上您專屬的 Firebase 金鑰！ 🚨
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDdMAx7dk55c_6z3alQenCG-FTONk0TkPY",
            authDomain: "milocup-live.firebaseapp.com",
            projectId: "milocup-live",
            storageBucket: "milocup-live.firebasestorage.app",
            messagingSenderId: "988514415331",
            appId: "1:988514415331:web:de2f269acbc03b12070bd6"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'milo-cup-live'; // 固定賽事 ID

        window.globalState = null;
        window.currentUser = null;
        window.userRole = localStorage.getItem(`role_${appId}`) || null;
        window.docRef = null;
        
        window.currentTab = 'main'; // 核心控制狀態 (main 或 score)

        function optimizeMatchOrder(matches) {
            if (matches.length <= 2) return matches; let arranged = []; let playerLastPlayed = {};
            arranged.push(matches.shift()); playerLastPlayed[arranged[0].p1] = 0; playerLastPlayed[arranged[0].p2] = 0;
            while (matches.length > 0) {
                let bestIndex = 0; let maxScore = -1;
                for (let i = 0; i < matches.length; i++) {
                    let m = matches[i]; let dist1 = playerLastPlayed[m.p1] !== undefined ? arranged.length - playerLastPlayed[m.p1] : 999; let dist2 = playerLastPlayed[m.p2] !== undefined ? arranged.length - playerLastPlayed[m.p2] : 999;
                    let score = Math.min(dist1, dist2); if (score > maxScore) { maxScore = score; bestIndex = i; }
                }
                let nextMatch = matches.splice(bestIndex, 1)[0]; arranged.push(nextMatch); playerLastPlayed[nextMatch.p1] = arranged.length - 1; playerLastPlayed[nextMatch.p2] = arranged.length - 1;
            } return arranged;
        }

        function generateKnockoutStructure(numGroups) {
            let cols = []; const createM = (id, title, p1Seed, p2Seed) => ({ id, title, p1: '', p2: '', s1: 0, s2: 0, p1Seed, p2Seed });
            if (numGroups === 2) { cols.push({ title: 'Semi-Finals (四強)', matches: [ createM('sf1', '準決賽 A', 'A組 #1', 'B組 #2'), createM('sf2', '準決賽 B', 'B組 #1', 'A組 #2') ] }); } 
            else if (numGroups === 3) { cols.push({ title: 'Round 1 (外卡)', matches: [ createM('r1_1', 'Match 1', '#4', '#5'), createM('r1_2', 'Match 2', '#3', '#6') ] }); cols.push({ title: 'Semi-Finals (準決賽)', matches: [ createM('sf1', '準決賽 A', '#1 (保送)', '勝 M1'), createM('sf2', '準決賽 B', '#2 (保送)', '勝 M2') ] }); } 
            else if (numGroups === 4) { cols.push({ title: 'Quarter-Finals (八強)', matches: [ createM('qf1', '八強 A', 'A組 #1', 'B組 #2'), createM('qf2', '八強 B', 'C組 #1', 'D組 #2'), createM('qf3', '八強 C', 'B組 #1', 'A組 #2'), createM('qf4', '八強 D', 'D組 #1', 'C組 #2') ] }); cols.push({ title: 'Semi-Finals (準決賽)', matches: [ createM('sf1', '準決賽 1', '勝 八強A', '勝 八強B'), createM('sf2', '準決賽 2', '勝 八強C', '勝 八強D') ] }); }
            cols.push({ title: 'Finals (決賽)', matches: [ { ...createM('f1', '🥇 冠軍戰', '晉級者 1', '晉級者 2'), isFinal: true }, { ...createM('f2', '🥉 季軍戰', '敗者 1', '敗者 2'), isBronze: true } ] }); return cols;
        }

        function generateSingleElimination(players) {
            let cols = []; let numPlayers = players.length; let bracketSize = Math.pow(2, Math.ceil(Math.log2(numPlayers))); if (bracketSize < 2) bracketSize = 2;
            let numRounds = Math.log2(bracketSize); let currentPlayers = [...players]; while(currentPlayers.length < bracketSize) currentPlayers.push('輪空'); currentPlayers.sort(() => Math.random() - 0.5); 
            let roundTitles = [];
            for(let i=0; i<numRounds; i++) {
                let mCount = bracketSize / Math.pow(2, i + 1); if (mCount === 1) roundTitles.push('Finals (決賽)'); else if (mCount === 2) roundTitles.push('Semi-Finals (四強)'); else if (mCount === 4) roundTitles.push('Quarter-Finals (八強)'); else roundTitles.push(`Round ${i+1} (${mCount*2}強)`);
            }
            let matchIdCounter = 1;
            for(let r=0; r<numRounds; r++) {
                let matchesInRound = bracketSize / Math.pow(2, r + 1); let roundMatches = [];
                for(let m=0; m<matchesInRound; m++) {
                    let isFinal = (r === numRounds - 1); let title = isFinal ? '🥇 冠軍戰' : `Match ${matchIdCounter}`; let p1 = '', p2 = '', p1Seed = '', p2Seed = '';
                    if (r === 0) { p1 = currentPlayers[m*2]; p2 = currentPlayers[m*2 + 1]; p1Seed = `隨機排籤`; p2Seed = `隨機排籤`; } 
                    else { let prevM1 = cols[r-1].matches[m*2].id; let prevM2 = cols[r-1].matches[m*2 + 1].id; p1Seed = `勝 ${prevM1}`; p2Seed = `勝 ${prevM2}`; }
                    roundMatches.push({ id: `M${matchIdCounter}`, title: title, p1: p1, p2: p2, s1: 0, s2: 0, p1Seed: p1Seed, p2Seed: p2Seed, isFinal: isFinal }); matchIdCounter++;
                } cols.push({ title: roundTitles[r], matches: roundMatches });
                if (r === numRounds - 1) cols[r].matches.push({ id: `M${matchIdCounter}`, title: '🥉 季軍戰', p1: '', p2: '', s1: 0, s2: 0, p1Seed: '敗 準決賽', p2Seed: '敗 準決賽', isBronze: true });
            } return cols;
        }

        window.generateTournament = async function() {
            const text = document.getElementById('playerList').value; let players = text.split('\n').map(p => p.trim()).filter(p => p !== '');
            const format = document.getElementById('tournamentFormat').value; const numGroups = parseInt(document.getElementById('groupCount').value);
            if (players.length < 2) { showModal(`至少需要 2 名選手！`); return; }
            let groupsData = []; let knockoutData = [];
            if (format === 'group') {
                if (players.length < numGroups * 2) { showModal(`小組賽至少需要 ${numGroups * 2} 名選手！`); return; } players.sort(() => Math.random() - 0.5);
                groupsData = Array.from({length: numGroups}, (_, i) => ({ id: i, name: groupLabels[i], players: [], matches: [] }));
                players.forEach((p, index) => groupsData[index % numGroups].players.push({ name: p, w: 0, l: 0, pts: 0, rank: '-' }));
                groupsData.forEach((g) => {
                    let tempMatches = []; for (let i = 0; i < g.players.length; i++) for (let j = i + 1; j < g.players.length; j++) tempMatches.push({ p1: g.players[i].name, p2: g.players[j].name, s1: 0, s2: 0 });
                    g.matches = optimizeMatchOrder(tempMatches).map((m, idx) => ({ id: `g${g.id}_${idx+1}`, p1: m.p1, p2: m.p2, s1: 0, s2: 0 }));
                });
                knockoutData = generateKnockoutStructure(numGroups);
            } else { knockoutData = generateSingleElimination(players); }
            const newState = { players: players, format: format, numGroups: format==='group'?numGroups:0, groups: groupsData, knockout: knockoutData };
            try { await setDoc(window.docRef, newState); } catch (e) { showModal("發布失敗: " + e.message); }
        }

            }
            if (!nextMatch && s.knockout) {
                for (let col of s.knockout) { for (let m of col.matches) { if ((m.p1 === pName || m.p2 === pName) && m.s1 === 0 && m.s2 === 0) { nextMatch = m; matchType = m.title; break; } } if(nextMatch) break; }
            }
            dash.classList.remove('hidden');

        window.updateScoreState = function(type, idx1, idx2, key, val) {
            let s = JSON.parse(JSON.stringify(window.globalState));
            if (type === 'g_m') s.groups[idx1].matches[idx2][key] = Math.max(0, s.groups[idx1].matches[idx2][key] + val);
            else if (type === 'k_m') s.knockout[idx1].matches[idx2][key] = Math.max(0, s.knockout[idx1].matches[idx2][key] + val);
            else if (type === 'g_p') s.groups[idx1].players[idx2][key] = Math.max(0, s.groups[idx1].players[idx2][key] + val);
            else if (type === 'g_r') s.groups[idx1].players[idx2][key] = val;
            else if (type === 'k_n') s.knockout[idx1].matches[idx2][key] = val;
            saveState(s);
        }

        async function saveState(newState) { try { await setDoc(window.docRef, newState); } catch (e) { showModal("更新失敗"); } }
        window.resetTournament = function() {
            document.getElementById('modal-msg').innerText = "確定要刪除整個賽事嗎？所有紀錄將會消失且無法復原！";
            const btn = document.querySelector('#custom-modal button'); btn.innerText = "確定刪除";
            btn.onclick = async () => {
                closeModal(); showCoreScreen('loading-screen');
                try { await setDoc(window.docRef, { deleted: true }); window.location.reload(); } catch(e) { showModal("重置失敗"); }
            };
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        window.showModal = function(msg) { document.getElementById('modal-msg').innerText = msg; document.querySelector('#custom-modal button').onclick = closeModal; document.getElementById('custom-modal').classList.remove('hidden'); }
        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); }

        // ================= 計分板獨立邏輯 =================
        window.addSbScore = function(p, pts) {
            if (sbGameOver && pts > 0) return;
            sbScores[p] = Math.max(0, sbScores[p] + pts);
            let scoreEl = document.getElementById(`sb-score-${p}`);
            scoreEl.innerText = sbScores[p];
            scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
            if (pts > 0) checkSbWinner();
        }

        window.resetSbPlayer = function(p) { sbScores[p] = 0; document.getElementById(`sb-score-${p}`).innerText = "0"; }

        window.resetAllAndCloseSbVictory = function() {
            sbScores = { 1: 0, 2: 0 };
            document.getElementById('sb-score-1').innerText = "0"; document.getElementById('sb-score-2').innerText = "0";
            document.getElementById('sb-victory-screen').classList.remove('active', 'sb-p1-win', 'sb-p2-win');
            sbGameOver = false;
        }

        window.checkSbWinner = function() {
            let target = parseInt(document.getElementById('sb-winCondition').value);
            let screen = document.getElementById('sb-victory-screen');
            if (sbScores[1] >= target) {
                sbGameOver = true; document.getElementById('sb-winner-name').innerText = document.getElementById('sb-name-1').value; screen.classList.add('active', 'sb-p1-win');
            } else if (sbScores[2] >= target) {
                sbGameOver = true; document.getElementById('sb-winner-name').innerText = document.getElementById('sb-name-2').value; screen.classList.add('active', 'sb-p2-win');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
